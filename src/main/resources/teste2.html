<script>
    function openReport() {
        const a = document.createElement("a");
        a.href = `${window.origin}/mge/visualizadorArquivos.mge?chaveArquivo=${<%- chave %>}`;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.click();
    }

    openReport()
</script>
